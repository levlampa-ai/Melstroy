<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AM-AM-ZINO | OPTIMIZED BASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            background-image: url('img/bg.gif');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-color: #050508; color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden;
        }

        .app-container {
            display: flex; flex-direction: column; 
            width: 92%; max-width: 420px; 
            height: auto; max-height: 98vh;
            background-color: rgba(15, 15, 20, 0.75); border-radius: 30px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; box-sizing: border-box;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            margin: auto; transition: box-shadow 0.3s, transform 0.1s ease-out;
            position: relative;
        }

        /* --- ПОЛОСА УРОВНЯ (XP) --- */
        .xp-container { background: rgba(0,0,0,0.5); border-radius: 10px; padding: 6px 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .xp-header { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 900; color: #aaa; margin-bottom: 4px; }
        .xp-level { color: #ffd700; text-shadow: 0 0 5px #ffd700; }
        .xp-bar-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; position: relative; }
        .xp-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ff3366, #ffcc00); transition: width 0.3s ease-out; box-shadow: 0 0 10px #ffcc00; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        h1 { font-size: 1.3rem; font-weight: 900; margin: 0; color: #fff; text-transform: uppercase; letter-spacing: -0.5px; }
        .top-btns { display: flex; flex-direction: row; gap: 8px; }
        .icon-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 6px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: 0.1s; }
        .icon-btn:active { transform: scale(0.9); background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        .balance-section { text-align: center; padding: 5px 0; margin-bottom: 10px; }
        .balance-label { font-size: 0.65rem; color: #aaa; letter-spacing: 2px; }
        .balance-amount { font-size: 2.2rem; font-weight: 900; color: #fff; margin-top: 0px; text-shadow: 0 0 15px rgba(255,255,255,0.2); transition: 0.1s; }

        .mode-selector { display: flex; justify-content: space-between; background: rgba(0,0,0,0.5); border-radius: 12px; padding: 4px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .mode-btn { flex: 1; background: transparent; border: none; color: #888; padding: 6px 0; font-size: 0.7rem; font-weight: 700; font-family: 'Montserrat'; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { background: #fff; color: #000; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .slots-wrapper { display: grid; gap: 8px; padding: 12px; background: rgba(0, 0, 0, 0.6); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: inset 0 0 25px rgba(0,0,0,0.8); justify-content: center; align-content: center; margin-bottom: 10px; transition: 0.3s; }
        .grid-4 { grid-template-columns: repeat(2, 100px); grid-auto-rows: 100px; }
        .grid-6 { grid-template-columns: repeat(3, 75px); grid-auto-rows: 75px; }
        .grid-8 { grid-template-columns: repeat(4, 60px); grid-auto-rows: 60px; }

        .slot { background: #0d0d0f; border-radius: 12px; overflow: hidden; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255, 255, 255, 0.1); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.1s; }
        .slot img { width: 100%; height: 100%; object-fit: cover; transition: 0.1s; }

        @keyframes rgbRoll { 0% { transform: translateY(-80%) scale(1.1); filter: blur(4px) hue-rotate(0deg); } 100% { transform: translateY(80%) scale(1.1); filter: blur(4px) hue-rotate(360deg); } }
        .rolling { animation: rgbRoll 0.08s infinite linear; }
        @keyframes bounceStop { 0% { transform: translateY(-25px); filter: blur(0px) hue-rotate(0deg); } 40% { transform: translateY(10px); } 70% { transform: translateY(-5px); } 100% { transform: translateY(0); } }
        .stopped { animation: bounceStop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes flashStop { 0% { box-shadow: 0 0 0 #fff; } 50% { box-shadow: 0 0 30px #fff; } 100% { box-shadow: 0 0 0 #fff; } }
        .flash { animation: flashStop 0.25s linear; }
        
        .result-toast { text-align: center; height: 40px; font-weight: 900; color: #fff; font-size: 1rem; text-transform: uppercase; margin-bottom: 5px; transition: 0.1s; display: flex; align-items: center; justify-content: center; }

        .spin-button-main { width: 100%; background: #fff; color: #000; border: none; padding: 18px; border-radius: 18px; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.1s; margin-bottom: 10px; box-shadow: 0 6px 0 #ccc; position: relative; overflow: hidden; }
        .spin-button-main:active { transform: translateY(6px); box-shadow: 0 0px 0 #ccc; background: #eee; }
        .spin-button-main:disabled { background: #444; color: #666; box-shadow: 0 6px 0 #222; cursor: not-allowed; transform: none; }

        .controls-section { display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); }
        .bet-title { text-align: center; font-size: 0.75rem; color: #ffd700; font-weight: 900; letter-spacing: 1px; margin-bottom: -5px; }
        .bet-display { background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 4px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        /* Ограничиваем ввод ставки, чтобы не вписывали миллиарды вручную */
        input[type="number"] { background: none; border: none; color: #fff; font-size: 1.6rem; font-weight: 900; width: 100%; text-align: center; font-family: 'Montserrat'; outline: none; }
        .bet-btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .bet-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 10px 0; border-radius: 10px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.1s; }
        .bet-btn:active { transform: scale(0.9); background: #fff; color: #000; box-shadow: 0 0 10px #fff; }

        /* --- ЛЕТАЮЩИЙ ЛУТБОКС (НЛО) --- */
        @keyframes floatChest {
            0% { transform: translateX(-100px) translateY(0) rotate(-10deg) scale(1); opacity: 1; }
            25% { transform: translateX(25vw) translateY(-50px) rotate(10deg) scale(1.1); }
            50% { transform: translateX(50vw) translateY(20px) rotate(-10deg) scale(1); }
            75% { transform: translateX(75vw) translateY(-30px) rotate(10deg) scale(1.1); }
            100% { transform: translateX(120vw) translateY(0) rotate(-10deg) scale(1); opacity: 1; }
        }
        .floating-chest {
            position: fixed; top: 30%; left: 0; width: 70px; height: 70px; background: url('img/win_pin1.jpg') center/cover;
            border-radius: 15px; border: 2px solid #ffd700; box-shadow: 0 0 20px #ffd700;
            z-index: 10000; cursor: crosshair; animation: floatChest 4s linear forwards;
        }

        /* Комбо и Спец-Эффекты */
        .combo-container { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 2.5rem; font-weight: 900; color: #ff3300; white-space: nowrap; text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff0000, 2px 2px 0px #fff; z-index: 1000; pointer-events: none; opacity: 0; transition: 0.2s; }
        .combo-active { animation: comboPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes comboPop { 0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; } }
        
        .particle { position: fixed; width: 60px; height: 60px; object-fit: cover; border-radius: 12px; z-index: 9999; pointer-events: none; border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        @keyframes megaFountain { 0% { transform: translate(var(--startX), 110vh) rotate(0deg) scale(var(--scale)); opacity: 1; } 100% { transform: translate(var(--endX), -20vh) rotate(var(--rot)) scale(var(--scale)); opacity: 0; } }
        .particle-mega-fountain { animation: megaFountain cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes multiScatter { 0% { transform: translate(var(--startX), var(--startY)) scale(0) rotate(0deg); opacity: 1; } 10% { transform: translate(var(--startX), var(--startY)) scale(var(--scale)) rotate(20deg); opacity: 1; } 100% { transform: translate(var(--endX), var(--endY)) scale(calc(var(--scale) * 0.5)) rotate(var(--rot)); opacity: 0; } }
        .particle-multi-scatter { animation: multiScatter ease-out forwards; }

        @keyframes lvlUpShake { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 50px #ff3366; } 100% { transform: scale(1); } }
        .lvl-up-anim { animation: lvlUpShake 0.5s ease-out; }
    </style>
</head>
<body>

<audio id="bgMusic"></audio>

<div class="app-container" id="app">
    
    <div id="comboDisplay" class="combo-container"></div>

    <div class="header">
        <h1>Am-Am-zino</h1>
        <div class="top-btns">
            <button class="icon-btn" onclick="toggleMusic()" id="musicBtn">АУДИО: OFF</button>
            <button class="icon-btn" onclick="resetBalance()">РЕБУТ</button>
        </div>
    </div>

    <div class="xp-container">
        <div class="xp-header">
            <span>УРОВЕНЬ <span class="xp-level" id="lvlDisplay">1</span></span>
            <span><span id="xpDisplay">0</span>/<span id="xpMax">100</span> XP</span>
        </div>
        <div class="xp-bar-bg">
            <div class="xp-bar-fill" id="xpFill"></div>
        </div>
    </div>

    <div class="balance-section">
        <div class="balance-label">ОБЩАК</div>
        <div class="balance-amount" id="balanceText"><span id="balance"></span> ₽</div>
    </div>

    <div class="mode-selector" id="modeSelector">
        <button class="mode-btn" onclick="setMode(4, this)">4 СЛОТА</button>
        <button class="mode-btn" onclick="setMode(6, this)">6 СЛОТОВ</button>
        <button class="mode-btn active" onclick="setMode(8, this)">8 СЛОТОВ</button>
    </div>

    <div class="slots-wrapper grid-8" id="slotsArea"></div>

    <div class="result-toast" id="resultDisplay">ГОТОВ К ЗАНОСУ?</div>

    <button class="spin-button-main" id="spinBtn" onclick="spinSlots()">КРУТИТЬ</button>

    <div class="controls-section">
        <div class="bet-title">ВАША СТАВКА</div>
        <div class="bet-display">
            <input type="number" id="betAmount" value="100" min="10" max="1000000000000">
        </div>
        <div class="bet-btn-grid">
            <button class="bet-btn" onclick="setBet('min')">MIN</button>
            <button class="bet-btn" onclick="changeBet(100)">+100</button>
            <button class="bet-btn" onclick="changeBet('x2')">X2</button>
            <button class="bet-btn" onclick="setBet('max')">ALL</button>
        </div>
    </div>
</div>

<script>
    // ТВОИ КАРТИНКИ
    const symbols = ['img/1.jpg', 'img/2.jpg', 'img/3.jpg', 'img/4.jpg', 'img/5.jpg'];
    const winPins = ['img/win_pin1.jpg', 'img/win_pin2.jpg', 'img/win_pin3.jpg']; 
    const bgTracks = ['audio/bg1.mp3', 'audio/bg2.mp3', 'audio/bg3.mp3'];
    const winSounds = ['audio/win1.mp3', 'audio/win2.mp3', 'audio/win3.mp3', 'audio/win4.mp3', 'audio/win5.mp3'];
    const halfWinSounds = ['audio/half1.mp3', 'audio/half2.mp3', 'audio/half3.mp3'];
    const loseSounds = ['audio/lose1.mp3', 'audio/lose2.mp3', 'audio/lose3.mp3'];
    
    let currentMode = 8; 
    let balance = parseInt(localStorage.getItem('melstroyBalik')) || 1000;
    const betInput = document.getElementById("betAmount");
    let isSpinning = false;
    let slotElements = [];
    let currentWinStreak = 0;

    // --- СИСТЕМА УРОВНЕЙ И XP ---
    let playerLvl = parseInt(localStorage.getItem('playerLvl')) || 1;
    let playerXp = parseInt(localStorage.getItem('playerXp')) || 0;
    
    // --- ФУНКЦИЯ ДЛЯ ФОРМАТИРОВАНИЯ ОГРОМНЫХ ЧИСЕЛ ---
    function formatNumber(num) {
        if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T'; // Триллионы
        if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B'; // Миллиарды
        if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M'; // Миллионы
        if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K'; // Тысячи
        return num.toLocaleString();
    }

    function updateXP(amount) {
        playerXp += amount;
        let xpNeeded = playerLvl * 100;
        
        if (playerXp >= xpNeeded) {
            playerLvl++;
            playerXp = playerXp - xpNeeded;
            let levelUpReward = playerLvl * 2500;
            balance += levelUpReward;
            
            document.getElementById("app").classList.add("lvl-up-anim");
            setTimeout(() => document.getElementById("app").classList.remove("lvl-up-anim"), 500);
            
            document.getElementById("resultDisplay").innerHTML = `<span style="color:#00ff00">УРОВЕНЬ ${playerLvl}! +${formatNumber(levelUpReward)} ₽</span>`;
            triggerWinParticles(30); 
        }

        localStorage.setItem('playerLvl', playerLvl);
        localStorage.setItem('playerXp', playerXp);
        
        document.getElementById("lvlDisplay").innerText = playerLvl;
        document.getElementById("xpDisplay").innerText = formatNumber(playerXp);
        document.getElementById("xpMax").innerText = formatNumber(playerLvl * 100);
        document.getElementById("xpFill").style.width = `${(playerXp / (playerLvl * 100)) * 100}%`;
    }
    updateXP(0); 

    // --- ЛЕТАЮЩИЙ ЛУТБОКС (НЛО) ---
    setInterval(() => {
        if(document.querySelector('.floating-chest')) return; 
        if(Math.random() > 0.4) { 
            let chest = document.createElement('div');
            chest.className = 'floating-chest';
            chest.style.top = (Math.random() * 60 + 10) + '%';
            chest.onclick = function() {
                let reward = playerLvl * 500;
                balance += reward;
                updateUI();
                chest.remove();
                
                let pop = document.createElement('div');
                pop.innerText = `+${formatNumber(reward)} ₽!`;
                pop.style.cssText = `position:fixed; top:${chest.style.top}; left:50vw; color:#00ff00; font-size:2rem; font-weight:bold; z-index:10001; animation: bounceStop 1s forwards; text-shadow: 0 0 10px black;`;
                document.body.appendChild(pop);
                setTimeout(()=>pop.remove(), 1000);
            };
            document.body.appendChild(chest);
            setTimeout(() => chest.remove(), 4000);
        }
    }, 15000);

    // --- БАЗОВЫЕ ФУНКЦИИ ---
    const audio = document.getElementById("bgMusic");
    const musicBtn = document.getElementById("musicBtn");
    let isMusicPlaying = false; let isFirstSpin = true;

    audio.addEventListener('ended', () => { audio.src = bgTracks[Math.floor(Math.random() * bgTracks.length)]; audio.play().catch(e=>{}); });

    function renderSlots(count) {
        const area = document.getElementById("slotsArea");
        area.innerHTML = ''; area.className = `slots-wrapper grid-${count}`;
        slotElements = [];
        for (let i = 0; i < count; i++) {
            let div = document.createElement('div'); div.className = 'slot';
            let img = document.createElement('img'); img.src = symbols[Math.floor(Math.random() * symbols.length)];
            div.appendChild(img); area.appendChild(div); slotElements.push(img);
        }
    }

    function setMode(numSquares, btnElement) {
        if (isSpinning) return; currentMode = numSquares;
        const buttons = document.querySelectorAll('.mode-btn'); buttons.forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active'); renderSlots(currentMode); document.getElementById("resultDisplay").innerText = "РЕЖИМ ОБНОВЛЕН!";
    }
    renderSlots(currentMode);

    function updateUI() { 
        document.getElementById("balance").innerText = formatNumber(balance); 
        localStorage.setItem('melstroyBalik', balance); 
    }
    updateUI();

    function setBet(t) { 
        if(isSpinning) return; 
        if(t==='min') betInput.value=10; 
        if(t==='max') {
            // Защита от переполнения инпута
            let maxBet = balance > 1e12 ? 1e12 : balance;
            betInput.value = maxBet; 
        }
    }
    function changeBet(v) { 
        if(isSpinning) return; 
        let b = parseInt(betInput.value) || 0; 
        let newBet = (v==='x2') ? b*2 : b+v; 
        if(newBet > 1e12) newBet = 1e12;
        betInput.value = newBet;
    }

    function toggleMusic() {
        if (!audio.src || audio.src.endsWith(".html")) audio.src = bgTracks[Math.floor(Math.random()*bgTracks.length)];
        if (isMusicPlaying) { audio.pause(); isMusicPlaying = false; musicBtn.innerText = "АУДИО: OFF"; }
        else { audio.play().catch(e=>{}); isMusicPlaying = true; musicBtn.innerText = "АУДИО: ON"; }
    }

    function resetBalance() { if(confirm("РЕБУТ СИСТЕМЫ?")) { balance=1000; currentWinStreak=0; updateUI(); } }

    function playEffect(soundsArray) {
        if (soundsArray.length === 0) return;
        const s = new Audio(soundsArray[Math.floor(Math.random()*soundsArray.length)]);
        s.play().catch(e => {});
    }

    function generateRiggedBoard(mode) {
        const rand = Math.random();
        let targetSameCount = 0; let multiplier = 0; let msg = ""; let isMegaCheckerboard = false;

        // НЕРФ ШАНСОВ (~40% побед вместо 65%)
        if (rand < 0.01) { // 1% шанс (было 2%)
            multiplier = mode === 4 ? 10 : mode === 6 ? 30 : 100; msg = "ШАХ И МАТ! x" + multiplier; isMegaCheckerboard = true;
        } else if (rand < 0.06) { // 5% шанс (было 10%)
            targetSameCount = mode === 4 ? 4 : mode === 6 ? 6 : 8; multiplier = mode === 4 ? 5 : mode === 6 ? 15 : 30; msg = "МЕГА ЗАНОС! x" + multiplier;
        } else if (rand < 0.16) { // 10% шанс (было 23%)
            targetSameCount = mode === 4 ? 3 : mode === 6 ? 4 : 6; multiplier = mode === 4 ? 2 : mode === 6 ? 5 : 10; msg = "КРУТО! x" + multiplier;
        } else if (rand < 0.40) { // 24% шанс (было 30%)
            targetSameCount = mode === 4 ? 2 : mode === 6 ? 3 : 4; multiplier = mode === 4 ? 1 : mode === 6 ? 1 : 2; msg = "ОКУП! x" + multiplier;
        } else { // 60% слив (было 35%)
            targetSameCount = mode === 4 ? 1 : mode === 6 ? 2 : 3; multiplier = 0; msg = "МИМО";
        }

        let board = []; let winSymbolsIndices = [];

        if (isMegaCheckerboard) {
            let mainSym = symbols[Math.floor(Math.random() * symbols.length)];
            let altSym = symbols.filter(s => s !== mainSym)[Math.floor(Math.random() * (symbols.length - 1))];
            let width = mode / 2; 
            for(let i=0; i<mode; i++) {
                let row = Math.floor(i / width); let col = i % width;
                if ((row + col) % 2 === 0) { board.push(mainSym); winSymbolsIndices.push(i); } else { board.push(altSym); }
            }
            return { finalBoard: board, baseWinMultiplier: multiplier, message: msg, winningIndices: winSymbolsIndices, isMegaCheckerboard: true };
        } else {
            let mainSymbol = symbols[Math.floor(Math.random() * symbols.length)];
            for(let i=0; i<targetSameCount; i++) board.push(mainSymbol);
            let availableSymbols = symbols.filter(s => s !== mainSymbol);
            while(board.length < mode) board.push(availableSymbols[Math.floor(Math.random() * availableSymbols.length)]);
            let shuffledBoard = [];
            let tempIndices = Array.from({length: mode}, (_, i) => i).sort(() => Math.random() - 0.5);
            for(let i=0; i<mode; i++) {
                let originalIndex = tempIndices[i]; shuffledBoard.push(board[originalIndex]);
                if (board[originalIndex] === mainSymbol && winSymbolsIndices.length < targetSameCount) winSymbolsIndices.push(i);
            }
            return { finalBoard: shuffledBoard, baseWinMultiplier: multiplier, message: msg, winningIndices: multiplier > 0 ? winSymbolsIndices : [], isMegaCheckerboard: false };
        }
    }

    function triggerWinParticles(multiplier) {
        let count = 0; let effectType = 'scatter'; 
        if (multiplier >= 30) { count = 100; effectType = 'fountain'; } 
        else if (multiplier >= 10) { count = 60; effectType = 'fountain'; } 
        else if (multiplier >= 2) { count = 30; effectType = 'scatter'; }
        else { count = 10; effectType = 'scatter'; } 

        const allPossibleImgs = [...symbols, ...winPins];

        for(let i=0; i<count; i++) {
            setTimeout(() => {
                const img = document.createElement('img'); img.className = 'particle'; img.src = allPossibleImgs[Math.floor(Math.random() * allPossibleImgs.length)];
                let scale = Math.random() * 1.0 + 0.4; let rot = (Math.random() - 0.5) * 1400 + 'deg'; 

                if (effectType === 'fountain') {
                    let startX = (Math.random() * 100) + 'vw'; let endX = (Math.random() * 100) + 'vw'; 
                    img.style.left = '0'; img.style.top = '0'; img.style.setProperty('--startX', startX); img.style.setProperty('--endX', endX); img.style.setProperty('--rot', rot); img.style.setProperty('--scale', scale);
                    img.classList.add('particle-mega-fountain'); img.style.animationDuration = (Math.random() * 1.2 + 0.8) + 's';
                } else {
                    let startX = (Math.random() * 60 + 20) + 'vw'; let startY = (Math.random() * 40 + 30) + 'vh'; let endX = (Math.random() - 0.5) * 150 + 'vw'; let endY = (Math.random() - 0.5) * 150 + 'vh';
                    img.style.left = '0'; img.style.top = '0'; img.style.setProperty('--startX', startX); img.style.setProperty('--startY', startY); img.style.setProperty('--endX', endX); img.style.setProperty('--endY', endY); img.style.setProperty('--rot', rot); img.style.setProperty('--scale', scale);
                    img.classList.add('particle-multi-scatter'); img.style.animationDuration = (Math.random() * 0.8 + 0.5) + 's';
                }
                document.body.appendChild(img); setTimeout(() => img.remove(), 2500); 
            }, i * 20); 
        }
    }

    function spinSlots() {
        if (isSpinning) return;
        let bet = parseInt(betInput.value) || 0;
        if (bet > balance || bet <= 0) return; 

        if (isFirstSpin) { if (!isMusicPlaying) toggleMusic(); isFirstSpin = false; }

        balance -= bet; 
        updateUI(); isSpinning = true;
        document.getElementById("spinBtn").disabled = true;
        
        const balanceText = document.getElementById("balanceText");
        balanceText.style.transform = "scale(0.8) translateY(10px)"; setTimeout(() => balanceText.style.transform = "scale(1)", 100);

        document.getElementById("comboDisplay").classList.remove('combo-active');
        
        slotElements.forEach(img => img.parentElement.classList.remove('win-pulse'));
        slotElements.forEach(el => { el.classList.remove('stopped'); el.classList.add('rolling'); });

        const outcome = generateRiggedBoard(currentMode);
        let ticks = 0;

        const timer = setInterval(() => {
            ticks++;
            if (ticks <= 15) {
                slotElements.forEach(el => { el.src = symbols[Math.floor(Math.random() * symbols.length)]; });
            } else {
                clearInterval(timer);
                slotElements.forEach((el, index) => {
                    setTimeout(() => {
                        el.classList.remove('rolling'); el.classList.add('stopped');
                        el.src = outcome.finalBoard[index];
                        el.parentElement.classList.add('flash'); setTimeout(() => el.parentElement.classList.remove('flash'), 300);
                    }, index * (300 / currentMode)); 
                });
                setTimeout(() => {
                    finishSpin(outcome.baseWinMultiplier, outcome.message, bet, outcome.winningIndices, outcome.isMegaCheckerboard);
                }, (300 / currentMode) * currentMode + 200);
            }
        }, 30); 
    }

    function finishSpin(baseMultiplier, msg, bet, winningIndices, isMegaCheckerboard) {
        const res = document.getElementById("resultDisplay");
        const comboEl = document.getElementById("comboDisplay");
        let finalMultiplier = baseMultiplier;

        updateXP(10 + (baseMultiplier * 5));

        if (baseMultiplier > 0) {
            currentWinStreak++;
            if (currentWinStreak >= 3) {
                finalMultiplier = baseMultiplier + currentWinStreak; 
                comboEl.innerText = `🔥 СТРИК x${currentWinStreak}! 🔥`;
                void comboEl.offsetWidth; 
                comboEl.classList.add('combo-active');
                msg = `КОМБО! x${finalMultiplier}`;
            }
        } else {
            currentWinStreak = 0;
        }

        let win = bet * finalMultiplier;

        if (win > 0) {
            balance += win;
            res.innerHTML = `<span style="color:#00ff00; text-shadow: 0 0 10px #00ff00;">${msg} (+${formatNumber(win)})</span>`;
            
            triggerWinParticles(finalMultiplier);

            if (winningIndices && winningIndices.length > 0) {
                winningIndices.forEach(idx => { slotElements[idx].parentElement.classList.add('win-pulse'); });
            }

            if (finalMultiplier > 1) { playEffect(winSounds); } else { playEffect(halfWinSounds); }
            
            const balanceText = document.getElementById("balanceText");
            balanceText.style.transform = "scale(1.3) translateY(-10px)"; balanceText.style.color = "#00ff00";
            setTimeout(() => { balanceText.style.transform = "scale(1)"; balanceText.style.color = "#fff"; }, 150);
        } else {
            res.innerHTML = `<span style="color:#aaa;">${msg}</span>`;
        }
        
        updateUI();
        isSpinning = false;
        document.getElementById("spinBtn").disabled = false;
    }
</script>
